# --- Status bar ---
# Pill end caps — rounded by default; machines with the theme switcher
# override these from the generated colors.conf (-o = don't override).
set -goq @cap_l ""
set -goq @cap_r ""

set -g status-position top
set -g status-interval 5
set -g status-style 'bg=#{@bg_dim} fg=#{@grey1}'
set -g status-left-length 30
set -g status-right-length 50

# Left: session name in accent pill
set -g status-left '#[fg=#{@accent},bg=#{@bg_dim}]#{@cap_l}#[fg=#{@bg_dim},bg=#{@accent},bold] #S #[fg=#{@accent},bg=#{@bg_dim}]#{@cap_r}#[default] '

# Right: prefix indicator + time

set -g status-right '#{?client_prefix,#[fg=#{@accent}]#[bg=#{@bg_dim}]#{@cap_l}#[fg=#{@bg_dim}]#[bg=#{@accent}] PREFIX #[fg=#{@accent}]#[bg=#{@bg_dim}]#{@cap_r}#[default] ,}'

# Inactive windows: muted
set -g window-status-format '#[fg=#{@grey0}] #I:#W '
set -g window-status-separator ''

# Active window: accent pill
set -g window-status-current-format '#[fg=#{@bg1},bg=#{@bg_dim}]#{@cap_l}#[fg=#{@fg},bg=#{@bg1},bold] #I:#W #[fg=#{@bg1},bg=#{@bg_dim}]#{@cap_r}#[default]'

# Pane borders
set -g pane-border-style 'fg=#{@bg3}'
set -g pane-active-border-style 'fg=#{@accent}'

# Message and command bar
set -g message-style 'bg=#{@bg1} fg=#{@fg}'
set -g message-command-style 'bg=#{@bg1} fg=#{@fg}'

set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'
