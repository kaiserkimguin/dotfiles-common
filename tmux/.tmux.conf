# --- Prefix ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- Accent color (run extract-theme.sh after theme changes) ---
source-file ~/.config/tmux/colors.conf

# --- General ---
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g detach-on-destroy off
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on

# --- Terminal and timing ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -sg escape-time 10
set -g focus-events on

# --- Splits (keep current path) ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- Pane navigation (Alt + hjkl, no prefix needed) ---
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- Window navigation (Alt + Shift + hl) ---
bind -n M-H previous-window
bind -n M-L next-window

# --- Vi mode ---
setw -g mode-keys vi
set -g status-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# --- Status bar ---
source-file ~/.config/tmux/statusbar.conf

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @resurrect-strategy-nvim 'session'

# --- TPM (must be last) ---
run '~/.tmux/plugins/tpm/tpm'
