# ============================================================================
# MODULES
# ============================================================================

[os]
disabled = false
style = "bg:color_accent fg:color_fg0"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[username]
show_always = true
style_user = "bg:color_accent fg:color_fg0"
style_root = "bg:color_accent fg:color_fg0"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_secondary"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:color_tertiary"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_tertiary)]($style)'

[git_status]
style = "bg:color_tertiary"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_tertiary)]($style)'

[nodejs]
symbol = ""
style = "bg:color_quaternary"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_quaternary)]($style)'

[bun]
symbol = ""
style = "bg:color_quaternary"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_quaternary)]($style)'

[c]
symbol = ""
style = "bg:color_quaternary"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_quaternary)]($style)'

[cpp]
symbol = ""
style = "bg:color_quaternary"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_quaternary)]($style)'

[rust]
symbol = ""
style = "bg:color_quaternary"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_quaternary)]($style)'

[golang]
symbol = ""
style = "bg:color_quaternary"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_quaternary)]($style)'

[php]
symbol = ""
style = "bg:color_quaternary"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_quaternary)]($style)'

[java]
symbol = ""
style = "bg:color_quaternary"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_quaternary)]($style)'

[kotlin]
symbol = ""
style = "bg:color_quaternary"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_quaternary)]($style)'

[haskell]
symbol = ""
style = "bg:color_quaternary"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_quaternary)]($style)'

[python]
symbol = ""
style = "bg:color_quaternary"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_quaternary)]($style)'

[docker_context]
symbol = ""
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:color_fg0 bg:color_bg3)]($style)'

[conda]
symbol = "  "
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[  $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](bold fg:color_green)'
error_symbol = '[❯](bold fg:color_red)'
vimcmd_symbol = '[❮](bold fg:color_green)'
vimcmd_replace_one_symbol = '[❮](bold fg:color_purple)'
vimcmd_replace_symbol = '[❮](bold fg:color_purple)'
vimcmd_visual_symbol = '[❮](bold fg:color_secondary)'

[cmd_duration]
show_milliseconds = true
format = " in $duration "
disabled = false
show_notifications = true
min_time_to_notify = 45000
