"$schema" = 'https://starship.rs/config-schema.json'

format = """
[░▒▓](color_accent)\
$os\
$username\
[](bg:color_secondary fg:color_accent)\
$directory\
[](fg:color_secondary bg:color_tertiary)\
$git_branch\
$git_status\
[](fg:color_tertiary bg:color_quaternary)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_quaternary  bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[](fg:color_bg3 bg:color_bg1)\
$time\
[](fg:color_bg1)\
$line_break$character"""

palette = 'catppuccin'

